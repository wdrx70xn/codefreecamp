name: No translate on GitHub
'on':
  pull_request_target:
    branches:
    - main
    paths:
    - curriculum/challenges/**/*.md
    - '!curriculum/challenges/english/**'
    - client/i18n/locales/**/intro.json
    - client/i18n/locales/**/translations.json
    - '!client/i18n/locales/english/**'
    - docs/i18n/**
jobs:
  has-translation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/github-script@v5
      with:
        github-token: ${{secrets.CAMPERBOT_NO_TRANSLATE}}
        script: "const isDev = await github.rest.teams.getMembershipForUserInOrg({\n\
          \  org: \"freeCodeCamp\",\n  team_slug: \"dev-team\",\n  username: context.payload.pull_request.user.login\n\
          }).catch(() => ({status: 404}));\nif (context.payload.pull_request.user.login\
          \ !== \"camperbot\" && isDev.status !== 200) {\n  core.setFailed('This PR\
          \ appears to touch translated curriculum files.')\n  github.rest.issues.createComment({\n\
          \    issue_number: context.issue.number,\n    owner: context.repo.owner,\n\
          \    repo: context.repo.repo,\n    body: \"Thanks for your pull-request.\\\
          n\\nWe are no longer accepting changes to the non-English versions of files\
          \ in parts of this codebase. This pull-request seems to change some of those.\
          \ Please visit [our contributing guidelines](https://contribute.freecodecamp.org)\
          \ to learn more about translating freeCodeCamp's resources.\\n\\nAs always,\
          \ we value all of your contributions.\\n\\nHappy contributing!\\n\\n---\\\
          n_**Note:** This message was automatically generated by a bot. If you feel\
          \ this message is in error or would like help resolving it, feel free to\
          \ reach us [in our contributor chat](https://chat.freecodecamp.org/channel/contributors)._\"\
          \n  })\n} else if (isDev.status === 200) {\n  core.setFailed('This PR appears\
          \ to touch translated curriculum files, but since you are on the dev team\
          \ there is no message.');\n} else {\n  github.rest.issues.createComment({\n\
          \    issue_number: context.issue.number,\n    owner: context.repo.owner,\n\
          \    repo: context.repo.repo,\n    body: 'WAIT! This message serves as a\
          \ sanity check. You should *only* see this message if the PR was created\
          \ as part of a Crowdin download action.'\n  })\n}\n"
