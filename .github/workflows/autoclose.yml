name: Autoclose
'on':
  pull_request_target:
    branches:
    - main
    paths:
    - .gitignore
jobs:
  autoclose:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/github-script@v5
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: "const patches = [\n  \"@@ -63,7 +63,6 @@ $RECYCLE.BIN/\\n # Icon\
          \ must end with two \\\\r\\n Icon\\n \\n-\\n # Thumbnails\\n ._*\\n \",\n\
          \  \"@@ -63,7 +63,6 @@ $RECYCLE.BIN/\\n # Icon must end with two \\\\r\\\
          n Icon\\n \\n-\\n # Thumbnails\\n ._*\\n \\n@@ -165,7 +164,6 @@ config/curriculum.json\\\
          n config/i18n/all-langs.js\\n config/certification-settings.js\\n \\n-\\\
          n ### vim ###\\n # Swap\\n [._]*.s[a-v][a-z]\",\n  \"@@ -165,7 +165,6 @@\
          \ config/curriculum.json\\n config/i18n/all-langs.js\\n config/certification-settings.js\\\
          n \\n-\\n ### vim ###\\n # Swap\\n [._]*.s[a-v][a-z]\"\n];\nconst files\
          \ = await github.rest.pulls.listFiles({\n  owner: context.payload.repository.owner.login,\n\
          \  repo: context.payload.repository.name,\n  pull_number: context.payload.pull_request.number,\n\
          });\nif (\n  files.data.length === 1 &&\n  files.data[0].filename === \"\
          .gitignore\" &&\n  patches.includes(files.data[0].patch)\n) {\n  core.setFailed(\"\
          Invalid PR detected.\");\n  github.rest.issues.createComment({\n    issue_number:\
          \ context.issue.number,\n    owner: context.repo.owner,\n    repo: context.repo.repo,\n\
          \    body: \"Thank you for opening this pull request.\\n\\nThis is a standard\
          \ message notifying you that we've reviewed your pull request and have decided\
          \ not to merge it. We would welcome future pull requests from you.\\n\\\
          nThank you and happy coding.\",\n  });\n  await github.rest.pulls.update({\n\
          \    owner: context.payload.repository.owner.login,\n    repo: context.payload.repository.name,\n\
          \    pull_number: context.payload.pull_request.number,\n    state: \"closed\"\
          \n  });\n  await github.rest.issues.addLabels({\n    owner: context.payload.repository.owner.login,\n\
          \    repo: context.payload.repository.name,\n    issue_number: context.issue.number,\n\
          \    labels: [\"invalid\"]\n  });\n}\n"
